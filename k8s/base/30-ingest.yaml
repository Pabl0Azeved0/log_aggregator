apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/component: ingest
  template:
    metadata:
      labels:
        app.kubernetes.io/component: ingest
    spec:
      containers:
        - name: ingest
          image: log-aggregator:latest
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "log_aggregator.api.ingest:app", "--host", "0.0.0.0", "--port", "8000"]
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
          env:
            - name: BUFFER_BACKEND
              value: "kafka"
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: "100m"
              memory: 256Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ingest
spec:
  selector:
    app.kubernetes.io/component: ingest
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ingest
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ingest
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
