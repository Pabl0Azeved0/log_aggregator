# Single alerting worker on its own consumer group (sliding-window rule state is in-process,
# so keep this at one replica unless rules are sharded by tenant).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alerting
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: alerting
  template:
    metadata:
      labels:
        app.kubernetes.io/component: alerting
    spec:
      containers:
        - name: alerting
          image: log-aggregator:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "log_aggregator.workers.alerting"]
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
          env:
            - name: BUFFER_BACKEND
              value: "kafka"
            - name: KAFKA_GROUP
              value: "alerting"
          resources:
            requests:
              cpu: "100m"
              memory: 256Mi
            limits:
              memory: 512Mi
