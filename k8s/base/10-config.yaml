apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  KAFKA_BOOTSTRAP: "kafka:9092"
  KAFKA_TOPIC: "logs"
  STORE_BACKEND: "opensearch"
  OPENSEARCH_URL: "http://opensearch:9200"
  RETENTION_DAYS: "7"
  ARCHIVE_ENABLED: "true"
  ARCHIVE_BUCKET: "log-archive"
  S3_ENDPOINT: "http://minio:9000"
  AUTH_ENABLED: "true"
  ALERT_RULES: '[{"name":"error-burst","level":"ERROR","threshold":500,"window_s":10,"cooldown_s":30}]'
---
# Demo placeholders — you MUST replace these. With AUTH_ENABLED=true the app fails closed on
# this placeholder JWT_SECRET (it refuses to boot), so set a real 32+ byte secret via
# `kubectl create secret generic app-secret ...` or an external-secrets operator.
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
type: Opaque
stringData:
  JWT_SECRET: "change-me-to-a-32-plus-byte-random-secret"
  API_KEYS: "demo-key:acme"
  S3_ACCESS_KEY: "minioadmin"
  S3_SECRET_KEY: "minioadmin"
