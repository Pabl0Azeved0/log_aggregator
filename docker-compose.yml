services:
  kafka:
    image: apache/kafka:3.9.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10

  opensearch:
    image: opensearchproject/opensearch:2.19.0
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - osdata:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  ingest:
    build: .
    # single worker so the in-process Prometheus counters at /metrics are exact; the
    # throughput ceiling is the load generator (single connection), not this process —
    # scale out with multiple ingest replicas behind the same Kafka when needed.
    command: uvicorn log_aggregator.ingest_api:app --host 0.0.0.0 --port 8000 --workers 1
    environment:
      BUFFER_BACKEND: kafka
      KAFKA_BOOTSTRAP: kafka:9092
    ports:
      - "8000:8000"
    depends_on:
      kafka:
        condition: service_healthy

  indexer:
    build: .
    command: python -m log_aggregator.indexer
    environment:
      BUFFER_BACKEND: kafka
      KAFKA_BOOTSTRAP: kafka:9092
      STORE_BACKEND: opensearch
      OPENSEARCH_URL: http://opensearch:9200
      ARCHIVE_ENABLED: "true"          # tiered retention: snapshot to object storage, then delete
      ARCHIVE_BUCKET: log-archive
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
    depends_on:
      kafka:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      minio:
        condition: service_healthy

  alerting:
    build: .
    command: python -m log_aggregator.alerting
    environment:
      BUFFER_BACKEND: kafka
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_GROUP: alerting          # own consumer group — reads independently of the indexer
      STORE_BACKEND: opensearch
      OPENSEARCH_URL: http://opensearch:9200
      ALERT_RULES: '[{"name":"error-burst","level":"ERROR","threshold":500,"window_s":10,"cooldown_s":30}]'
      # ALERT_WEBHOOK: https://hooks.slack.com/services/...   # console log when unset
    depends_on:
      kafka:
        condition: service_healthy
      opensearch:
        condition: service_healthy

  query:
    build: .
    command: uvicorn log_aggregator.query_api:app --host 0.0.0.0 --port 8080
    environment:
      STORE_BACKEND: opensearch
      OPENSEARCH_URL: http://opensearch:9200
    ports:
      - "8080:8080"
    depends_on:
      opensearch:
        condition: service_healthy

  # --- shipper sidecar demo (opt-in): `docker compose --profile sidecar up -d` ---
  demo-app:
    build: .
    command: python scripts/demo_app.py
    environment:
      DEMO_LOG: /shared/app.log
    volumes:
      - shared-logs:/shared
    profiles: ["sidecar"]

  agent:
    build: .
    command: python -m log_aggregator.agent
    environment:
      INGEST_URL: http://ingest:8000
      AGENT_FILE: /shared/app.log
      AGENT_SERVICE: demo-app
    volumes:
      - shared-logs:/shared
    depends_on:
      - ingest
    profiles: ["sidecar"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  osdata:
  miniodata:
  shared-logs:
