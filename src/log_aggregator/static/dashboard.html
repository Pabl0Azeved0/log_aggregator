<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>log-aggregator</title>
<style>
  body { font-family: ui-monospace, Menlo, monospace; background: #131316; color: #e6e6e6; margin: 0; }
  header { display: flex; gap: 12px; align-items: center; padding: 12px 16px; background: #1b1b20; position: sticky; top: 0; }
  h1 { font-size: 15px; margin: 0 12px 0 0; color: #46f1c5; }
  input, select, button { background: #232329; color: #e6e6e6; border: 1px solid #333; border-radius: 6px; padding: 6px 10px; font: inherit; }
  button { cursor: pointer; }
  #stats { padding: 8px 16px; color: #9a9aa5; font-size: 12px; }
  table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  th, td { text-align: left; padding: 5px 10px; border-bottom: 1px solid #222; vertical-align: top; }
  th { color: #9a9aa5; position: sticky; top: 56px; background: #131316; }
  .ERROR, .CRITICAL { color: #ff6b6b; } .WARNING { color: #ffd166; } .DEBUG { color: #7d7d8a; }
  td.msg { white-space: pre-wrap; word-break: break-word; }
</style>
</head>
<body>
<header>
  <h1>log-aggregator</h1>
  <input id="q" placeholder="search message…" size="28">
  <select id="level">
    <option value="">level</option><option>DEBUG</option><option>INFO</option>
    <option>WARNING</option><option>ERROR</option><option>CRITICAL</option>
  </select>
  <input id="service" placeholder="service" size="12">
  <button onclick="refresh()">Search</button>
  <label><input type="checkbox" id="live" checked> live tail</label>
</header>
<div id="stats"></div>
<table>
  <thead><tr><th>time</th><th>level</th><th>service</th><th>message</th></tr></thead>
  <tbody id="rows"></tbody>
</table>
<script>
async function refresh() {
  const p = new URLSearchParams();
  for (const id of ["q", "level", "service"]) {
    const v = document.getElementById(id).value.trim();
    if (v) p.set(id, v);
  }
  p.set("limit", "200");
  const [hits, stats] = await Promise.all([
    fetch("/search?" + p).then(r => r.json()),
    fetch("/stats").then(r => r.json()),
  ]);
  document.getElementById("stats").textContent =
    `total ${stats.total} · ` +
    Object.entries(stats.by_level || {}).map(([k, v]) => `${k} ${v}`).join(" · ");
  document.getElementById("rows").innerHTML = hits.map(e => `
    <tr><td>${(e.timestamp || "").replace("T", " ").slice(0, 23)}</td>
    <td class="${e.level}">${e.level}</td><td>${e.service}</td>
    <td class="msg">${String(e.message).replace(/</g, "&lt;")}</td></tr>`).join("");
}
setInterval(() => { if (document.getElementById("live").checked) refresh(); }, 2000);
refresh();
</script>
</body>
</html>
