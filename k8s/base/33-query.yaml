apiVersion: apps/v1
kind: Deployment
metadata:
  name: query
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/component: query
  template:
    metadata:
      labels:
        app.kubernetes.io/component: query
    spec:
      containers:
        - name: query
          image: log-aggregator:latest
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "log_aggregator.api.query:app", "--host", "0.0.0.0", "--port", "8080"]
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: "100m"
              memory: 256Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: query
spec:
  selector:
    app.kubernetes.io/component: query
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: query
spec:
  rules:
    - host: log-aggregator.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: query
                port:
                  number: 8080
